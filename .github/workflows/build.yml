name: Build SuperTux APK

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java 8 (Required for Ant & Legacy SDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Install Ant and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ant wget unzip lib32z1 lib32stdc++6

      - name: Download & Extract CrystaX NDK r4
        run: |
          cd $HOME
          wget https://www.crystax.net/download/android-ndk-r4-linux-x86-crystax-4.tar.bz2 --quiet
          tar -xf android-ndk-r4-linux-x86-crystax-4.tar.bz2
          rm android-ndk-r4-linux-x86-crystax-4.tar.bz2
          
          echo "$HOME/android-ndk-r4-crystax" >> $GITHUB_PATH

      - name: Set up Legacy Android SDK (API 8) & Platform Tools & Build Tools
        run: |
          cd $HOME
          wget https://dl.google.com/android/android-sdk_r24.4.1-linux.tgz --quiet
          tar -xf android-sdk_r24.4.1-linux.tgz
          
          echo "ANDROID_HOME=$HOME/android-sdk-linux" >> $GITHUB_ENV
          cd $HOME/android-sdk-linux
          
          (while sleep 3; do echo "y"; done) | ./tools/android update sdk --no-ui --all --filter android-8,platform-tools
          
          mkdir -p build-tools
          wget https://dl-ssl.google.com/android/repository/build-tools_r24.0.3-linux.zip --quiet
          unzip -q build-tools_r24.0.3-linux.zip -d build-tools/temp
          SRC_DIR=$(ls -d build-tools/temp/* | head -n 1)
          mv "$SRC_DIR" build-tools/24.0.3
          rm -rf build-tools/temp build-tools_r24.0.3-linux.zip

      - name: Set up Android SDK paths in project
        run: |
          $ANDROID_HOME/tools/android list targets
          $ANDROID_HOME/tools/android update project --path . --target android-8

      - name: Build Native C++ Code (NDK)
        run: |
          ndk-build -j$(nproc)

      - name: Build APK with Ant
        run: |
          ant clean
          ant debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperTux-debug-APK
          path: bin/*debug*.apk

